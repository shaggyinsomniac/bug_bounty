{% extends "_base.html" %}
{% from "components/severity_badge.html" import severity_badge %}

{% block title %}Findings — Kanban{% endblock %}

{% block content %}
<div class="space-y-4">

  <!-- Header -->
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-3">
      <h1 class="text-2xl font-bold text-slate-100">Findings</h1>
      <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-slate-700 text-slate-300">
        {{ total }}
      </span>
    </div>
    <!-- View toggle -->
    <div class="flex items-center gap-1 bg-slate-800 border border-slate-700 rounded p-1 text-sm">
      <a href="/findings"
         class="px-3 py-1 rounded text-slate-400 hover:text-white hover:bg-slate-700 transition-colors">
        Table
      </a>
      <a href="/findings?view=kanban"
         class="px-3 py-1 rounded bg-blue-600 text-white font-medium">
        Kanban
      </a>
    </div>
  </div>

  <!-- Kanban board -->
  <div id="kanban-container">
    {% include "findings/_kanban.html" %}
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
  kanbanDnD();

  // SSE: new finding → prepend to "new" column
  if (typeof Alpine !== 'undefined') {
    const checkStore = () => {
      try {
        const sseStore = Alpine.store('sse');
        if (sseStore && sseStore.subscribe) {
          sseStore.subscribe('finding.discovered', () => {
            // Reload kanban via HTMX
            htmx.ajax('GET', '/findings?view=kanban', {
              target: '#kanban-container',
              swap: 'innerHTML',
              headers: { 'HX-Request': 'true' }
            });
          });
        } else {
          setTimeout(checkStore, 500);
        }
      } catch (_) {}
    };
    setTimeout(checkStore, 100);
  }
});
</script>
{% endblock %}
