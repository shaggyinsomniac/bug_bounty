<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bounty UI — Login</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f9fafb; }
    .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); width: 100%; max-width: 360px; }
    h2 { margin: 0 0 1.5rem; color: #1a1a1a; }
    label { display: block; margin-bottom: 0.3rem; font-size: 0.9em; color: #4b5563; }
    input[type=password] { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
    button { margin-top: 1rem; width: 100%; padding: 0.6rem; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .error { color: #dc2626; font-size: 0.875rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🎯 Bounty UI</h2>
    <form method="post" action="/login">
      <label for="token">Access Token</label>
      <input type="password" id="token" name="token" placeholder="Enter UI_TOKEN" required autofocus>
      {% if error is defined and error %}
        <p class="error">{{ error }}</p>
      {% endif %}
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
